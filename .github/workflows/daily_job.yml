name: Daily Job Search Plan

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: |
            search_plan_cache.json
            job_score_cache.json
            location_cache.json
          key: job-search-cache-${{ runner.os }}-${{ steps.date.outputs.date }}
          restore-keys: |
            job-search-cache-${{ runner.os }}-

      - name: Run job search email plan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: job-search-email

      - name: Save cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            search_plan_cache.json
            job_score_cache.json
            location_cache.json
          key: job-search-cache-${{ runner.os }}-${{ steps.date.outputs.date }}
